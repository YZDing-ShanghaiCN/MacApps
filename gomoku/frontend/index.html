<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gomoku</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-label="Gomoku board">
        <div class="top-bar">
          <div>
            <h1>Gomoku</h1>
            <p id="mode-status" class="mode-status">模式：双人对战</p>
            <p id="status" class="status">Loading...</p>
            <p id="timer" class="timer">黑棋 00:00　白棋 00:00</p>
          </div>
          <div class="controls">
            <div class="mode-actions" role="group" aria-label="选择对战模式">
              <button id="mode-local-button" type="button" aria-pressed="true">
                双人对战
              </button>
              <button id="mode-ai-button" type="button" aria-pressed="false">
                人机对战
              </button>
            </div>
            <div class="difficulty-actions" role="group" aria-label="选择 AI 难度">
              <button id="difficulty-simple-button" type="button" aria-pressed="true">
                简单
              </button>
              <button id="difficulty-normal-button" type="button" disabled>
                普通（开发中）
              </button>
              <button id="difficulty-hard-button" type="button" disabled>
                困难（开发中）
              </button>
            </div>
            <div class="actions">
              <button id="start-button" type="button">开始对局</button>
              <button id="undo-button" type="button">悔棋</button>
              <button id="reset-button" type="button">重新开始</button>
            </div>
          </div>
        </div>

        <div id="board" class="board" aria-label="15 by 15 Gomoku board"></div>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="/static/main.js"></script>
  </body>
</html>
