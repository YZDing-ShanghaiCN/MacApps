<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gomoku</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-label="Gomoku board">
        <div class="top-bar">
          <div>
            <h1>Gomoku</h1>
            <p id="status" class="status">Loading...</p>
          </div>
          <div class="actions">
            <button id="undo-button" type="button">悔棋</button>
            <button id="reset-button" type="button">重新开始</button>
          </div>
        </div>

        <div id="board" class="board" aria-label="15 by 15 Gomoku board"></div>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="/static/main.js"></script>
  </body>
</html>
