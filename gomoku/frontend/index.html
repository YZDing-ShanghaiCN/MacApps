<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>五子棋</title>
    <meta name="theme-color" content="#2f6f67" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/style.css?v=0.3.4" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-label="五子棋棋盘">
        <header class="game-header">
          <div class="game-heading">
            <h1>五子棋</h1>
            <p id="mode-status" class="mode-status">模式：双人对战</p>
            <p id="status" class="status" aria-live="polite">Loading...</p>
            <p id="timer" class="timer sr-only">黑棋 00:00　白棋 00:00</p>
          </div>
          <div class="controls">
            <div class="mode-actions" role="group" aria-label="选择对战模式">
              <button id="mode-local-button" type="button" aria-pressed="true">
                双人对战
              </button>
              <button id="mode-ai-button" type="button" aria-pressed="false">
                人机对战
              </button>
            </div>
            <div id="difficulty-actions" class="difficulty-actions" role="group" aria-label="选择 AI 难度">
              <button id="difficulty-simple-button" type="button" aria-pressed="true">
                简单
              </button>
              <button id="difficulty-normal-button" type="button" aria-pressed="false">
                普通
              </button>
              <button id="difficulty-hard-button" type="button" disabled>
                困难（开发中）
              </button>
            </div>
            <div id="color-actions" class="option-actions" role="group" aria-label="选择人类棋色" hidden>
              <button id="color-black-button" type="button" aria-pressed="true">我执黑</button>
              <button id="color-white-button" type="button" aria-pressed="false">我执白</button>
              <button id="color-random-button" type="button" aria-pressed="false">随机棋色</button>
            </div>
            <div class="actions">
              <button id="start-button" type="button">开始对局</button>
              <button id="undo-button" type="button">悔棋</button>
              <button id="reset-button" type="button">重新开始</button>
            </div>
          </div>
        </header>

        <div class="game-table">
          <aside id="black-player-card" class="player-card black-player" aria-label="黑方信息">
            <span class="player-stone player-stone-black" aria-hidden="true"></span>
            <div class="player-card-copy">
              <p class="player-color">黑方</p>
              <h2 id="black-role" class="player-role">玩家一</h2>
              <p id="black-state" class="player-state">等待开始</p>
            </div>
            <time id="black-time" class="player-time">00:00</time>
          </aside>

          <div class="board-stage">
            <p class="orientation-hint">横屏使用可获得更大的棋盘和更准确的落子体验。</p>
            <div id="board" class="board" aria-label="15×15 五子棋棋盘"></div>
            <p id="message" class="message" role="status" aria-live="polite"></p>
          </div>

          <aside id="white-player-card" class="player-card white-player" aria-label="白方信息">
            <span class="player-stone player-stone-white" aria-hidden="true"></span>
            <div class="player-card-copy">
              <p class="player-color">白方</p>
              <h2 id="white-role" class="player-role">玩家二</h2>
              <p id="white-state" class="player-state">等待开始</p>
            </div>
            <time id="white-time" class="player-time">00:00</time>
          </aside>
        </div>

        <section class="online-entry" aria-labelledby="online-entry-title">
          <div>
            <p class="eyebrow">跨网对战</p>
            <h2 id="online-entry-title">和好友远程下棋</h2>
            <p>创建私密房间后，复制链接或扫码邀请对方加入。</p>
          </div>
          <button id="create-room-button" class="primary-button" type="button">创建私人房间</button>
        </section>

        <details id="ai-debug-panel" class="ai-debug-panel" hidden>
          <summary>AI 调试信息</summary>
          <p id="ai-debug-summary" class="ai-debug-summary">尚无搜索数据</p>
          <ol id="ai-debug-candidates" class="ai-debug-candidates">
            <li>完成一次 AI 落子后显示候选</li>
          </ol>
          <div class="actions ai-debug-actions">
            <button id="copy-debug-button" type="button">复制问题局面</button>
            <button id="download-debug-button" type="button">下载 JSON</button>
          </div>
        </details>
      </section>
    </main>

    <dialog id="game-result-dialog" class="result-dialog" aria-labelledby="result-title">
      <button id="result-close-button" class="dialog-close" type="button" aria-label="关闭结果窗口">×</button>
      <p class="eyebrow">本局结束</p>
      <h2 id="result-title">对局结束</h2>
      <p id="result-summary" class="status"></p>
      <div class="actions dialog-actions">
        <button id="result-primary-button" class="primary-button" type="button">再来一局</button>
        <button id="result-secondary-button" type="button">查看棋盘</button>
      </div>
    </dialog>

    <script src="/static/pwa.js?v=0.3.4"></script>
    <script src="/static/main.js?v=0.3.4"></script>
  </body>
</html>
